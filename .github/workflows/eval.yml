name: eval

# Triggers: PR + nightly + manual dispatch. Deliberately NOT every push -- the
# eval costs ~60 Bedrock calls per run (Haiku subject + Sonnet judge) and takes
# several minutes.
on:
  pull_request:
    branches: [main]
    paths:
      - "app/src/main/**"
      - "app/src/test/java/com/example/copilot/eval/**"
      - "app/src/test/resources/eval/**"
      - "app/src/test/resources/eval-thresholds.yml"
      - "app/src/test/resources/application-eval.yml"
      - "app/pom.xml"
      - ".github/workflows/eval.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"   # 17:00 UTC / 02:00 JST nightly

# SETUP REQUIRED (the three steps that activate this workflow):
# 1. Request Bedrock model access in us-east-1 for ALL THREE:
#    - anthropic.claude-haiku-4-5-20251001-v1:0   (the subject)
#    - anthropic.claude-sonnet-4-6                (the judge; SEPARATE grant)
#    - amazon.titan-embed-text-v2:0               (embeddings)
#    Each is a separate per-model toggle in the Bedrock console.
#    Heads-up: us. inference profiles route across us-east-1/us-east-2/us-west-2
#    and IAM checks InvokeModel on the foundation-model in the DESTINATION
#    region. If you see AccessDenied after a CI run despite having us-east-1
#    access, enable Haiku/Sonnet model access in us-east-2 and us-west-2 too.
# 2. cd infra/eval-ci && terraform apply
#    infra/eval-ci/ is a dedicated Terraform root that owns ONLY the GitHub
#    OIDC provider (idempotent; flip var.create_github_oidc_provider=false if
#    you already have one) and the solutions-copilot-eval IAM role with the
#    Bedrock-only inline policy. Note the eval_role_arn output -- you need it
#    for step 3. (Phase 3 cleanup moved these out of the main infra/ root so
#    a bare apply in infra/ no longer entangles the free eval IAM with the
#    prod stack.)
# 3. GitHub repo -> Settings -> Secrets and variables -> Actions -> Variables
#    -> set EVAL_AWS_ROLE_ARN to the role ARN from step 2.
# Until step 3 lands, the job is skipped cleanly by the `if:` guard below
# (same pattern as deploy.yml).
#
# Cost: each run does ~40-60 Bedrock calls (~$0.20-0.40 on Sonnet judge).
# Triggers: PR + nightly cron + workflow_dispatch. Drop the cron in the `on:`
# block above if you want PR + dispatch only.

permissions:
  id-token: write
  contents: read

jobs:
  eval:
    if: ${{ vars.EVAL_AWS_ROLE_ARN != '' }}
    runs-on: ubuntu-latest

    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: copilot_eval
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: copilot_eval
      DB_USERNAME: copilot
      DB_PASSWORD: copilot
      # CI runs in us-east-1 with us. inference profiles. The eval corpus is
      # synthetic / non-customer data so Japan data-residency does not apply
      # here; local devs use jp. profiles via run-eval.sh.
      AWS_REGION: us-east-1
      BEDROCK_CHAT_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
      # Sonnet judge is the gating baseline. To reproduce CI numbers locally:
      # EVAL_JUDGE_MODEL=jp.anthropic.claude-sonnet-4-6 ./run-eval.sh
      EVAL_JUDGE_MODEL: us.anthropic.claude-sonnet-4-6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.EVAL_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run eval (writes target/eval-report.json + .md)
        working-directory: app
        run: mvn -B test -Peval

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            app/target/eval-report.json
            app/target/eval-report.md
            app/target/eval-report.html
          if-no-files-found: warn

      - name: Enforce thresholds (gate)
        working-directory: app
        run: mvn -B test -Pgate
