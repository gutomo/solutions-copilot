name: eval

# Triggers: PR + nightly + manual dispatch. Deliberately NOT every push -- the
# eval costs ~60 Bedrock calls per run (Haiku subject + Sonnet judge) and takes
# several minutes.
on:
  pull_request:
    branches: [main]
    paths:
      - "app/src/main/**"
      - "app/src/test/java/com/example/copilot/eval/**"
      - "app/src/test/resources/eval/**"
      - "app/src/test/resources/eval-thresholds.yml"
      - "app/src/test/resources/application-eval.yml"
      - "app/pom.xml"
      - ".github/workflows/eval.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"   # 17:00 UTC / 02:00 JST nightly

# SETUP REQUIRED in GitHub before this workflow does anything:
# 1. Request Bedrock model access in us-east-1 for ALL THREE:
#    - anthropic.claude-haiku-4-5-20251001-v1:0   (the subject; same as deploy)
#    - anthropic.claude-sonnet-4-6                (the judge; SEPARATE grant)
#    - amazon.titan-embed-text-v2:0               (embeddings; same as deploy)
#    Each is a separate per-model toggle in the Bedrock console.
# 2. Create a GitHub OIDC provider in AWS IAM if one doesn't exist
#    (token.actions.githubusercontent.com).
# 3. Create an IAM role `solutions-copilot-eval` trusting this repo's OIDC
#    (sub: repo:<owner>/<repo>:*) with permissions:
#      bedrock:InvokeModel + bedrock:InvokeModelWithResponseStream on:
#        arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-*
#        arn:aws:bedrock:*::foundation-model/anthropic.claude-sonnet-4-6*
#        arn:aws:bedrock:*::foundation-model/amazon.titan-embed-text-v2*
#        arn:aws:bedrock:*::inference-profile/us.anthropic.claude-haiku-4-5-*
#        arn:aws:bedrock:*::inference-profile/us.anthropic.claude-sonnet-4-6*
#    (separate from the deploy role -- eval needs Sonnet + Titan, deploy doesn't)
# 4. Set repo variable `EVAL_AWS_ROLE_ARN` to the role's ARN.
# Until step 4 lands, the job is skipped cleanly by the `if:` guard below
# (same pattern as deploy.yml).

permissions:
  id-token: write
  contents: read

jobs:
  eval:
    if: ${{ vars.EVAL_AWS_ROLE_ARN != '' }}
    runs-on: ubuntu-latest

    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: copilot_eval
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: copilot_eval
      DB_USERNAME: copilot
      DB_PASSWORD: copilot
      # CI runs in us-east-1 with us. inference profiles. The eval corpus is
      # synthetic / non-customer data so Japan data-residency does not apply
      # here; local devs use jp. profiles via run-eval.sh.
      AWS_REGION: us-east-1
      BEDROCK_CHAT_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
      # Sonnet judge is the gating baseline. To reproduce CI numbers locally:
      # EVAL_JUDGE_MODEL=jp.anthropic.claude-sonnet-4-6 ./run-eval.sh
      EVAL_JUDGE_MODEL: us.anthropic.claude-sonnet-4-6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.EVAL_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run eval (writes target/eval-report.json + .md)
        working-directory: app
        run: mvn -B test -Peval

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            app/target/eval-report.json
            app/target/eval-report.md
            app/target/eval-report.html
          if-no-files-found: warn

      - name: Enforce thresholds (gate)
        working-directory: app
        run: mvn -B test -Pgate
