name: deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# OIDC is the recommended auth path: create a GitHub OIDC provider + an IAM role
# trusting this repo, with permissions to push to ECR and run ecs:UpdateService.
# Set repo variables AWS_ROLE_ARN, AWS_REGION, ECR_REPOSITORY, ECS_CLUSTER, ECS_SERVICE.
# (Alternative: configure-aws-credentials with AWS_ACCESS_KEY_ID / SECRET secrets.)
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ vars.AWS_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Roll out new tasks
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --force-new-deployment
