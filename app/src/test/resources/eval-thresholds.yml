# Phase 3 slice 2 hard gate thresholds.
# Loaded by EvalGateTest via classpath (src/test/resources/eval-thresholds.yml).
# Numbers derived from the Sonnet-judge baseline locked 2026-05-31:
#   subject = us.anthropic.claude-haiku-4-5-20251001-v1:0  (temp 0.3, prod config)
#   judge   = us.anthropic.claude-sonnet-4-6               (temp 0)
#   region  = us-east-1                                    (matches CI)
#
# Observed baseline:
#   meanFaithfulness=99.9  perItemFaithfulnessMin=98
#   meanCitationF1=1.00    meanRetrievalRecall=1.00
#   meanCorrectness=1.00   meanRelevance=59.6
#       NOTE: the 59.6 is NOT a verbosity / long-form effect. The relevance
#       judge is passed only question+answer (NO retrieved context), so it
#       treats specific correct facts (document IDs, percentages) as
#       "fabrication" and tanks exactly those items (q01=12, q02=15, q07=22) --
#       even though faithfulness, which DOES get the context, scores the same
#       answers ~100. Kept report-only because it is not a trustworthy signal
#       yet. Slice-3 fix: feed the relevance judge the retrieved context, as
#       faithfulness does (or otherwise decouple it from perceived factuality).
#   judgeParseFailures=0
#
# Margins: ~10pt below observed for mean-of-score metrics, 0.10-0.15 for
# fraction metrics. Subject runs at temp 0.3 so item-level drift is real (up to
# 10pt per item); the per-item faithfulness floor (60) is well below clean
# answers (~100) but well above hallucinations (~5), so it bites only on real
# failures.
#
# Re-baseline (and rewrite this file) whenever the corpus, the subject model,
# or the judge model changes.

meanFaithfulness:    {floor: 90,   hard: true}
perItemFaithfulness: {floor: 60,   hard: true}
meanCitationF1:      {floor: 0.85, hard: true}
meanRetrievalRecall: {floor: 0.90, hard: true}
meanCorrectness:     {floor: 0.85, hard: true}
meanRelevance:       {floor: 50,   hard: false}     # report-only; relevance judge is context-starved (see header) -- not a trustworthy signal yet
judgeParseFailures:  {ceiling: 2,  hard: true}
