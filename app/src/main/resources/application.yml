spring:
  application:
    name: solutions-copilot

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:copilot}
    username: ${DB_USERNAME:copilot}
    password: ${DB_PASSWORD:copilot}

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    bedrock:
      aws:
        # Region is required. Credentials are intentionally omitted so the AWS
        # default provider chain resolves them from the ECS task role at runtime.
        region: ${AWS_REGION:us-east-1}
      converse:
        chat:
          options:
            # Confirm the exact inference-profile ID for your region in the
            # Bedrock console (Model catalog -> Inference profiles).
            # Japan data residency: swap the us. prefix for jp. and deploy in
            # ap-northeast-1, e.g. jp.anthropic.claude-haiku-4-5-20251001-v1:0
            model: ${BEDROCK_CHAT_MODEL:us.anthropic.claude-haiku-4-5-20251001-v1:0}
            temperature: 0.3
            max-tokens: 1024
      titan:
        embedding:
          # Titan Text Embeddings v2: 1024 dims, matches the vector(1024) column.
          # No us./jp. inference-profile prefix on embedding models.
          model: ${BEDROCK_EMBEDDING_MODEL:amazon.titan-embed-text-v2:0}
          input-type: TEXT
    # Spring AI 1.0.x picks an embedding implementation via this selector. The
    # bedrock-titan autoconfig only registers its EmbeddingModel bean when this
    # is set; without it, the pgvector auto-config has no embedding to wire.
    model:
      embedding: bedrock-titan
    vectorstore:
      pgvector:
        # Flyway owns the schema; do not let Spring AI create or alter the table.
        initialize-schema: false
        schema-name: public
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  # Phase 4 slice 2: OpenTelemetry tracing. Default = OFF (probability 0):
  # the SDK builds non-recording spans, the BatchSpanProcessor is never
  # invoked, the OTLP endpoint is never contacted, the request path takes
  # no measurable hit, and a missing/unreachable collector cannot spam logs
  # or block requests. Enable per-process by exporting:
  #   MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://your-collector:4318/v1/traces
  # Slice 1's cost meters stay on actuator /metrics; an OTLP metrics
  # pipeline is a later slice -- this one ships TRACES + the
  # ai.cost.usd/ai.chat.calls/ai.tokens.* tags on the HTTP root span.
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server:
  port: 8080

# Phase 4 slice 1: per-request token + cost accounting.
# Rates are configurable here -- NOT hardcoded -- so an operator can edit
# without rebuilding. Map keys are Bedrock model / inference-profile ids; the
# bracket-escape form is required for YAML map keys containing dots.
# Numbers below are illustrative (derived from Anthropic list pricing): real
# Bedrock cross-region inference may differ; verify against your billing
# console and update as needed. Unknown model at request time -> WARN once
# per request, $0 contribution, but tokens still counted.
copilot:
  cost:
    rates:
      "[jp.anthropic.claude-haiku-4-5-20251001-v1:0]":
        input-per-1k:  0.001
        output-per-1k: 0.005
      "[us.anthropic.claude-haiku-4-5-20251001-v1:0]":
        input-per-1k:  0.001
        output-per-1k: 0.005
      "[us.anthropic.claude-sonnet-4-6]":
        input-per-1k:  0.003
        output-per-1k: 0.015
