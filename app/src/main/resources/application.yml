spring:
  application:
    name: solutions-copilot

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:copilot}
    username: ${DB_USERNAME:copilot}
    password: ${DB_PASSWORD:copilot}

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    bedrock:
      aws:
        # Region is required. Credentials are intentionally omitted so the AWS
        # default provider chain resolves them from the ECS task role at runtime.
        region: ${AWS_REGION:us-east-1}
      converse:
        chat:
          options:
            # Confirm the exact inference-profile ID for your region in the
            # Bedrock console (Model catalog -> Inference profiles).
            # Japan data residency: swap the us. prefix for jp. and deploy in
            # ap-northeast-1, e.g. jp.anthropic.claude-haiku-4-5-20251001-v1:0
            model: ${BEDROCK_CHAT_MODEL:us.anthropic.claude-haiku-4-5-20251001-v1:0}
            temperature: 0.3
            max-tokens: 1024
      titan:
        embedding:
          # Titan Text Embeddings v2: 1024 dims, matches the vector(1024) column.
          # No us./jp. inference-profile prefix on embedding models.
          model: ${BEDROCK_EMBEDDING_MODEL:amazon.titan-embed-text-v2:0}
          input-type: TEXT
    # Spring AI 1.0.x picks an embedding implementation via this selector. The
    # bedrock-titan autoconfig only registers its EmbeddingModel bean when this
    # is set; without it, the pgvector auto-config has no embedding to wire.
    model:
      embedding: bedrock-titan
    vectorstore:
      pgvector:
        # Flyway owns the schema; do not let Spring AI create or alter the table.
        initialize-schema: false
        schema-name: public
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024

management:
  endpoints:
    web:
      exposure:
        # Phase 4 slice 3 adds circuitbreakers + circuitbreakerevents so the
        # bedrock-chat breaker's state and CLOSED/OPEN/HALF_OPEN transitions
        # are observable over HTTP.
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      probes:
        enabled: true
  # Phase 4 slice 2: OpenTelemetry tracing. Default = OFF (probability 0):
  # the SDK builds non-recording spans, the BatchSpanProcessor is never
  # invoked, the OTLP endpoint is never contacted, the request path takes
  # no measurable hit, and a missing/unreachable collector cannot spam logs
  # or block requests. Enable per-process by exporting:
  #   MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://your-collector:4318/v1/traces
  # Slice 1's cost meters stay on actuator /metrics; an OTLP metrics
  # pipeline is a later slice -- this one ships TRACES + the
  # ai.cost.usd/ai.chat.calls/ai.tokens.* tags on the HTTP root span.
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server:
  port: 8080

# Phase 4 slice 1: per-request token + cost accounting.
# Rates are configurable here -- NOT hardcoded -- so an operator can edit
# without rebuilding. Map keys are Bedrock model / inference-profile ids; the
# bracket-escape form is required for YAML map keys containing dots.
# Numbers below are illustrative (derived from Anthropic list pricing): real
# Bedrock cross-region inference may differ; verify against your billing
# console and update as needed. Unknown model at request time -> WARN once
# per request, $0 contribution, but tokens still counted.
copilot:
  cost:
    rates:
      "[jp.anthropic.claude-haiku-4-5-20251001-v1:0]":
        input-per-1k:  0.001
        output-per-1k: 0.005
      "[us.anthropic.claude-haiku-4-5-20251001-v1:0]":
        input-per-1k:  0.001
        output-per-1k: 0.005
      "[us.anthropic.claude-sonnet-4-6]":
        input-per-1k:  0.003
        output-per-1k: 0.015
  # Phase 4 slice 3: the SECOND Bedrock model the circuit breaker falls back to
  # when the primary (spring.ai.bedrock.converse.chat.options.model) is failing.
  # MUST be a genuinely different model id AND have a rate in copilot.cost.rates
  # above -- otherwise the fallback's cost call hits slice 1's loud unknown-model
  # WARN (billed $0) instead of being properly accounted. Default = the jp.
  # Haiku profile (data-residency theme); override per-process with
  # BEDROCK_FALLBACK_MODEL.
  chat:
    fallback-model: ${BEDROCK_FALLBACK_MODEL:jp.anthropic.claude-haiku-4-5-20251001-v1:0}

# Phase 4 slice 3: Resilience4j circuit breaker + bounded retry around the
# blocking POST /api/chat call (ChatService.chat). Thresholds live here, not in
# code. The breaker trips on primary-side faults a fallback model can cure and
# stays closed on request-content faults -- the record vs ignore decision walks
# the cause chain in BedrockFailurePredicate (record-exceptions/ignore-exceptions
# only match the THROWN type, which misses a wrapped SDK exception).
resilience4j:
  # Aspect order follows Spring's Ordered: LOWER value = higher precedence =
  # OUTER. CircuitBreaker (1) wraps Retry (2), so the bounded retry on a
  # transient primary fault is INNER -- one logical request counts as ONE
  # breaker call after the retry exhausts, and when the breaker is OPEN it
  # short-circuits BEFORE the retry runs (no wasted retries on an open breaker).
  circuitbreaker:
    circuit-breaker-aspect-order: 1
    instances:
      bedrock-chat:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5        # don't compute a rate on fewer than this
        failure-rate-threshold: 50         # >=50% failures over the window -> OPEN
        wait-duration-in-open-state: 10s    # short, so recovery is observable in the proof
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-failure-predicate: com.example.copilot.chat.BedrockFailurePredicate
  retry:
    retry-aspect-order: 2          # > circuit-breaker-aspect-order => Retry is INNER
    instances:
      bedrock-chat:
        max-attempts: 2                    # one bounded retry before a failure counts
        wait-duration: 200ms
        # Retry only the fallback-curable transient faults. A bad request or
        # an access-denied won't get better on retry, so don't waste a call.
        retry-exceptions:
          - software.amazon.awssdk.services.bedrockruntime.model.ThrottlingException
          - software.amazon.awssdk.services.bedrockruntime.model.InternalServerException
          - software.amazon.awssdk.services.bedrockruntime.model.ModelNotReadyException
          - software.amazon.awssdk.services.bedrockruntime.model.ModelTimeoutException
          - software.amazon.awssdk.services.bedrockruntime.model.ServiceQuotaExceededException
          - software.amazon.awssdk.services.bedrockruntime.model.ModelErrorException
          - software.amazon.awssdk.core.exception.SdkClientException
